spring.application.name=app

# Datasource
# Note: not forget about this "?reWriteBatchedInserts=true" if you want to batch inser;
spring.datasource.url=jdbc:postgresql://localhost:5432/bookRentalDB?reWriteBatchedInserts=true
spring.datasource.username=daniel
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Note: used for batch insertion
# Note: batch_size is about the network (JDBC Driver, meaning the whole application configuration); when hibernate asks for ids DB will send allocationSize=? ids, because of this batch_size hibernate needs 50 ids to complete 1 insert interrogation => he will send allocationSize/batch_size (for example 110/50 meaning 3 interrogations) to get the available ids from the DB;
# Note: careful for the scenario where allocationSize > batch_size; for example allocationSize = 1000 & batch_size = 50; first we will get 1000 ids from the DB which are stored in the RAM server, imagine if the server is shut down, it will result in a huge gap (RAM will be cleared after restart) 1...50 will be used ids the rest 51...1000 lost ids (=> Exhausting the Type; that is why we use Long for ids), the sequence will continue to return ids from the 1001 ahead, never before that;
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.generate_statistics=true

# Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/book_rental
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9090/realms/book_rental/protocol/openid-connect/certs

spring.security.oauth2.client.registration.my-login-client.client-id=book_rental
spring.security.oauth2.client.registration.my-login-client.client-secret=${KC_CLIENT_SECRET}
spring.security.oauth2.client.registration.my-login-client.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.my-login-client.scope=openid,profile
spring.security.oauth2.client.provider.book-rental-auth.token-uri=http://localhost:9090/realms/book_rental/protocol/openid-connect/token
spring.security.oauth2.client.provider.book-rental-auth.issuer-uri=http://localhost:9090/realms/book_rental
spring.security.oauth2.client.provider.book-rental-auth.jwk-set-uri=http://localhost:9090/realms/book_rental/protocol/openid-connect/certs

auth.oauth2.server-url=http://localhost:9090
auth.oauth2.realm=book_rental
auth.oauth2.admin.username=admin
auth.oauth2.admin.password=${KC_ADMIN_PASSWORD}
auth.oauth2.admin.client-id=admin-cli
auth.oauth2.admin.realm=master

# Server
server.servlet.contextPath=/api
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.serialization.fail-on-empty-beans=false