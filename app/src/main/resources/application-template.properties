spring.application.name=app

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/bookRentalDB
spring.datasource.username=daniel
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# Security
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/book_rental
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=http://localhost:9090/realms/book_rental/protocol/openid-connect/certs

spring.security.oauth2.client.registration.my-login-client.client-id=book_rental
spring.security.oauth2.client.registration.my-login-client.client-secret=${KC_CLIENT_SECRET}
spring.security.oauth2.client.registration.my-login-client.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.my-login-client.scope=openid,profile
spring.security.oauth2.client.provider.book-rental-auth.token-uri=http://localhost:9090/realms/book_rental/protocol/openid-connect/token
spring.security.oauth2.client.provider.book-rental-auth.issuer-uri=http://localhost:9090/realms/book_rental
spring.security.oauth2.client.provider.book-rental-auth.jwk-set-uri=http://localhost:9090/realms/book_rental/protocol/openid-connect/certs

auth.oauth2.server-url=http://localhost:9090
auth.oauth2.realm=book_rental
auth.oauth2.admin.username=admin
auth.oauth2.admin.password=${KC_ADMIN_PASSWORD}
auth.oauth2.admin.client-id=admin-cli
auth.oauth2.admin.realm=master

# Server
server.servlet.contextPath=/api
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.serialization.fail-on-empty-beans=false